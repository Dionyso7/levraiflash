[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev:vite -- --port 5175"
  port = 8891
  targetPort = 5175

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
